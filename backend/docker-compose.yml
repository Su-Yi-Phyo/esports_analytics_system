services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mlbb_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: .
    container_name: mlbb_fastapi_backend
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: MLBB_DB
      DB_USER: sa
      DB_PASSWORD: YourStrong!Passw0rd
      ODBC_DRIVER: ODBC Driver 18 for SQL Server
    ports:
      - "8000:8000"

  mongo:
    image: mongo:7
    container_name: mlbb_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  sqlserver_data:
  mongo_data:
